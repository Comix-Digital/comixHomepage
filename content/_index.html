<div class="customHome">
    <canvas id="myCanvas" width="500" height="500"></canvas>
    <a class="aButton" href="https://comix-digital.github.io/comixDigitalSite/" style="box-shadow: 0 0px">
        <img src="/comixHomepage/images/mainblack.png" alt="Comix Digital logo." width="4096" height="4096" class="CDLogo" style="margin: 0 0">
    </a>
    <span id="bgChangeCircle"></span>
</div>

<script>
    let bgChangeCircle = document.getElementById("bgChangeCircle")
    let CDLogo = document.querySelector(".CDLogo")
    let aButton = document.querySelector(".aButton")
    let animationPlayed = false;
    let expandPixels = 120;
    const root = document.querySelector(':root');
    const delay = ms => new Promise(res => setTimeout(res, ms));
    var c = document.getElementById("myCanvas");
    var ctx = c.getContext("2d");
    ctx.canvas.width = window.innerWidth;
    ctx.canvas.height = window.innerHeight;

    function generateCirclePixels(x, y, r, color) {
        var i;
        var angle;
        var x1;
        var y1;
        
        ctx.fillStyle = color;

        for(i = 0; i < 360; i += 1)
        {
            angle = i;
            x1 = r * Math.cos(angle * Math.PI / 180);
            console.log(Math.round(x1));
            y1 = r * Math.sin(angle * Math.PI / 180);
            console.log(Math.round(y1));
            ctx.fillRect(x + (Math.round(x1) * 20), y + (Math.round(y1) * 20), 20, 20);
        }
    }

    async function animateCirclePixels() {
        for(i = 0; i < 12; i += 1) {
            generateCirclePixels(Math.ceil(window.innerWidth / 2), Math.ceil(window.innerHeight / 2), Math.ceil(window.innerWidth / expandPixels), "green");
            await delay(100);
            ctx.clearRect(0, 0, c.width, c.height);
            expandPixels = expandPixels - 10;
        }
        return 0;
    }

    aButton.addEventListener("mouseenter", function () {
        if (!animationPlayed) {
            animateCirclePixels();
            bgChangeCircle.style.display = "block";
            gsap.to(bgChangeCircle, {
                width: "80vmax",
                height: "80vmax",
                ease: "none",
                duration: 0.5,
            });
            gsap.to(bgChangeCircle, {
                width: "99vw",
                height: "110vh",
                "border-radius": "0%",
                delay: 0.5,
                ease: "none",
                duration: 0.5,
            });
            gsap.to(root, {
                "--theme": "rgb(0, 0, 0)",
                duration: 0,
                delay: 1,
            });
            gsap.to(bgChangeCircle, {
                display: "none",
                duration: 0,
                delay: 1,
            });
            animationPlayed = true;
        }
    })
</script>
