<div class="customHome">
    <canvas id="myCanvas" width="500" height="500"></canvas>
    <a class="aButton" href="https://comix-digital.github.io/comixDigitalSite/" style="box-shadow: 0 0px">
        <img src="/comixHomepage/images/mainblack.png" alt="Comix Digital logo." width="4096" height="4096" class="CDLogo" style="margin: 0 0">
    </a>
    <span id="bgChangeCircle"></span>
</div>

<script>
    let bgChangeCircle = document.getElementById("bgChangeCircle")
    let CDLogo = document.querySelector(".CDLogo")
    let aButton = document.querySelector(".aButton")
    let animationPlayed = false;
    const root = document.querySelector(':root');
    var c = document.getElementById("myCanvas");
    var ctx = c.getContext("2d");
    ctx.canvas.width = Math.ceil((window.innerWidth * 50 / 100));
    ctx.canvas.height = Math.ceil((window.innerWidth * 50 / 100));

    function animateCirclePixels(x, y, r, color) {
        var i;
        var angle;
        var x1;
        var y1;
        
        ctx.fillStyle = color;

        for(i = 0; i < 360; i += 0.1)
        {
            angle = i;
            x1 = r * Math.cos(angle * Math.PI / 180);
            console.log(Math.round(x1));
            y1 = r * Math.sin(angle * Math.PI / 180);
            console.log(Math.round(y1));
            ctx.fillRect(x + Math.round(x1), y + Math.round(y1), 1, 1);
        }
    }

    aButton.addEventListener("mouseenter", function () {
        if (!animationPlayed) {
            animateCirclePixels(Math.ceil((window.innerWidth * 50 / 100) / 2), Math.ceil((window.innerWidth * 50 / 100) / 2), 25, "green");
            bgChangeCircle.style.display = "block";
            gsap.to(bgChangeCircle, {
                width: "80vmax",
                height: "80vmax",
                ease: "none",
                duration: 0.5,
            });
            gsap.to(bgChangeCircle, {
                width: "99vw",
                height: "110vh",
                "border-radius": "0%",
                delay: 0.5,
                ease: "none",
                duration: 0.5,
            });
            gsap.to(root, {
                "--theme": "rgb(0, 0, 0)",
                duration: 0,
                delay: 1,
            });
            gsap.to(bgChangeCircle, {
                display: "none",
                duration: 0,
                delay: 1,
            });
            animationPlayed = true;
        }
    })
</script>
